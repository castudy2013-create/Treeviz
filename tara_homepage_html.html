<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tara Community Masterplan</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    /* HERO VIDEO */
    .hero {
      position: relative;
      height: 80vh;
      overflow: hidden;
    }

    .hero video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      background: rgba(0,0,0,0.3);
      padding: 20px 30px;
      border-radius: 12px;
    }

    .hero-text h1 {
      margin: 0;
      font-size: 36px;
    }

    .hero-text p {
      margin-top: 10px;
      font-size: 18px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    .card-title {
      position: absolute;
      bottom: 10px;
      left: 15px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    /* FEATURE */
    .feature {
      padding: 40px;
    }

    .feature video {
      width: 100%;
      border-radius: 16px;
    }

    /* TEXT */
    .concept {
      padding: 40px;
      text-align: center;
      font-size: 18px;
      max-width: 800px;
      margin: auto;
    }

    footer {
      padding: 20px;
      text-align: center;
      background: #111;
      color: white;
    }
  </style>
</head>
<body>

  <!-- HERO VIDEO -->
  <section class="hero">
    <video autoplay muted loop>
      <source src="hero.mp4" type="video/mp4">
    </video>
    <div class="hero-text">
      <h1>Tara Community Masterplan</h1>
      <p>Reimagining Play, Nature, and Community</p>
    </div>
  </section>

  <!-- PROGRAM GRID -->
  <section class="grid">
    <div class="card"><img src="playground.jpg"><div class="card-title">Playground</div></div>
    <div class="card"><img src="fitness.jpg"><div class="card-title">Fitness Zone</div></div>
    <div class="card"><img src="trails.jpg"><div class="card-title">Trails & Paths</div></div>
    <div class="card"><img src="seating.jpg"><div class="card-title">Seating Areas</div></div>
    <div class="card"><img src="garden.jpg"><div class="card-title">Community Garden</div></div>
    <div class="card"><img src="aerial.jpg"><div class="card-title">Aerial Overview</div></div>
  </section>

  <!-- FEATURE VIDEO -->
  <section class="feature">
    <video autoplay muted loop>
      <source src="feature.mp4" type="video/mp4">
    </video>
  </section>

  <!-- CONCEPT -->
  <section class="concept">
    A community-centered landscape integrating recreation, ecology, and social interaction.
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Tara Project | Designed by Frank Jiang
  </footer>

</body>
</html>
